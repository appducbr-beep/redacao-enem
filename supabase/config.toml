# ============================================================
# Supabase CLI — Configuração do Projeto Reda1000
# Gerado manualmente (equivalente ao `supabase init`).
# Necessário para que `supabase link` e `supabase db push`
# funcionem a partir da raiz do monorepo.
# ============================================================

project_id = "reda1000"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
port = 54324

[storage]
enabled = true

[edge_runtime]
enabled = true

[analytics]
enabled = false
